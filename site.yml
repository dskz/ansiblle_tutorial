---
- hosts: localhost
  connection: local
  pre_tasks:
  - name: install updates (MacOS)
    tags: always
    homebrew:
      update_homebrew: yes
    when: ansible_distribution == "MacOSX"

  - name: install updates (CentOS)
    tags: always
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "CentOS"

  - name: install updates (Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

 
- hosts: web_server
  tasks:
  - name: install httpd and php for CentOS
    tags: apache, centos, httpd
    dnf:
      name:
        - httpd
        - php 
      state: latest
      update_homebrew: yes
    when: ansible_distribution == "CentOS"
  - name: install apache2 and php for Debian
    tags: apache, apache2, ubuntu
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: latest
      update_homebrew: yes
    when: ansible_distribution == "Debian"

- hosts: db_server
  tasks:
  
  - name: install mariadb package (CentOS)
    tags: centos, db, mariadb
    dnf:
      name: mariadb
      state: latest
    when: ansible_distribution == "CentOS"
  - name: install mariadb package (Debian)
    tags: db, mariadb, ubuntu
    apt:
      name: mariadb-server
      state: latest
    when: ansible_distribution == "Debian"
